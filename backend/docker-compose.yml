services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: tecnoamigo
      POSTGRES_USER: tecnoamigo
      POSTGRES_PASSWORD: tecnoamigo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - .:/app

volumes:
  postgres_data:
